<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="/css/top.css">
    <title>ログイン</title>
</head>

<body class="login-page">

<header>
    <h1>My Portfolio</h1>
</header>

<main>

    <h1>ログイン</h1>

    <form class="login-form" action="/login" method="post">

        <div class="form-group">
            <label for="email">メールアドレス</label>
            <input
                    id="email"
                    type="email"
                    name="email"
                    placeholder="メールアドレス">
        </div>

        <div class="form-group">
            <label for="password">パスワード</label>
            <input
                    id="password"
                    type="password"
                    name="password"
                    placeholder="パスワード">
        </div>

        <p
                class="error-message"
                th:if="${loginError}"
                th:text="${loginError}">
        </p>

        <button class="submit-button" type="submit">
            ログインする
        </button>

    </form>

    <a href="/register" class="register-button">
        新規登録する
    </a>

</main>

<footer>
    portfolio site
</footer>

</body>
</html>
